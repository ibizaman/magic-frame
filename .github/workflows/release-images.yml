name: Release images

# Baut die App- und Caddy-Images vor und schiebt sie als Multi-Arch
# (amd64 + arm64) nach ghcr.io, damit User per `docker compose pull`
# installieren können statt lokal zu bauen — auf dem Raspberry Pi spart
# das 15-25 min Compile-Zeit. (#9)
#
# Läuft bei jedem v*-Release-Tag UND manuell (workflow_dispatch) zum Testen.
# Rein additiv: der bestehende build-from-source-Pfad bleibt unverändert.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Versions-Tag für die Images (z. B. 1.0.8). Leer lassen = nur :latest."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    # arm64 unter QEMU-Emulation ist langsam (xcaddy + Next.js build),
    # aber das passiert nur einmal pro Release, nicht pro User.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: magic-frame-app
            context: .
          - image: magic-frame-caddy
            context: ./caddy

    steps:
      - uses: actions/checkout@v4

      - name: Versions-Tag bestimmen
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # v1.0.8 -> 1.0.8
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Image-Tags zusammenstellen
        id: meta
        run: |
          IMG="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          TAGS="${IMG}:latest"
          if [ -n "${{ steps.ver.outputs.version }}" ]; then
            TAGS="${TAGS},${IMG}:${{ steps.ver.outputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login bei ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Getrennter Cache pro Image, sonst überschreiben sich app + caddy.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
